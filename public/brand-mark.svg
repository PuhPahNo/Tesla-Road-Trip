<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title description">
  <title id="title">Supercharger Quest</title>
  <desc id="description">A dimensional red lightning bolt surrounded by an electric glow.</desc>
  <defs>
    <radialGradient id="backdrop" cx="50%" cy="47%" r="70%">
      <stop offset="0" stop-color="#4b1012"/>
      <stop offset="0.58" stop-color="#1b1114"/>
      <stop offset="1" stop-color="#0b0d11"/>
    </radialGradient>
    <linearGradient id="bolt" x1="18" y1="9" x2="45" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6b61"/>
      <stop offset="0.28" stop-color="#ff332d"/>
      <stop offset="0.72" stop-color="#e82127"/>
      <stop offset="1" stop-color="#a7070d"/>
    </linearGradient>
    <linearGradient id="edge" x1="17" y1="9" x2="15" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff4ec"/>
      <stop offset="0.28" stop-color="#ffb09e"/>
      <stop offset="1" stop-color="#ff4b40" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="side" x1="45" y1="7" x2="34" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9d070d"/>
      <stop offset="1" stop-color="#5e0207"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="bolt-shadow" x="-30%" y="-20%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="1.4" flood-color="#000" flood-opacity=".72"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#backdrop)"/>
  <circle cx="32" cy="32" r="19" fill="#ff302a" opacity=".5" filter="url(#glow)"/>

  <g fill="none" stroke="#ff5c3f" stroke-linecap="round">
    <path d="M7 32h6M51 32h6M11.5 18.5l4 3M48.5 42.5l4 3M11.5 45.5l4-3M48.5 21.5l4-3" opacity=".72"/>
    <path d="M19 10l2 5M43 49l2 5M44 10l-2 5M19 49l-2 5" opacity=".45"/>
  </g>

  <g filter="url(#bolt-shadow)">
    <path d="M42.5 5 21.5 10.5 10.5 40l17.7-8.3-8 27.3 33.3-36.4-18.2 6.1L47.8 7.2 42.5 5Z" fill="url(#bolt)"/>
    <path d="m47.8 7.2-12.5 21.5 18.2-6.1-8.4 9.2-17 8.6L20.2 59l33.3-36.4-18.2 6.1L47.8 7.2Z" fill="url(#side)" opacity=".78"/>
    <path d="m21.5 10.5-11 29.5 5.5-4.2 10.2-24.2L42.5 5l-21 5.5Z" fill="url(#edge)"/>
    <path d="m10.5 40 17.7-8.3-2.1 7.1-15.6 1.2Z" fill="#ff9380" opacity=".56"/>
  </g>
</svg>
