<!doctype html>
<html lang="en" data-theme="dash">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=3" />
    <link rel="shortcut icon" href="/favicon-32.png?v=3" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0a0d12" id="theme-color-meta" />
    <style>
      .seo-static-fallback { max-width: 980px; margin: 0 auto; padding: 4rem 1.25rem; font: 16px/1.7 system-ui, sans-serif; }
      .seo-static-fallback h1 { font-size: clamp(2.5rem, 7vw, 5rem); line-height: .95; letter-spacing: -.055em; }
      .seo-static-fallback h2 { margin-top: 3rem; font-size: 1.75rem; line-height: 1.1; }
      .seo-static-fallback a { color: #b51217; }
      .seo-static-fallback aside { margin-top: 2rem; padding: 1.25rem; background: #eee9df; }
      .js .seo-static-fallback { display: none; }
    </style>
    <script>document.documentElement.classList.add('js')</script>
    <meta
      name="description"
      content="Build and save a Tesla Supercharger route for the 2026 competition. Plan around your Tesla, real-world range, Iconic Charger badges, landmarks, and daily driving limits."
    />
    <link rel="canonical" href="https://www.teslachargequest.com/" />
    <meta property="og:url" content="https://www.teslachargequest.com/" />
    <meta property="og:site_name" content="ChargeQuest" />
    <meta property="og:title" content="ChargeQuest CORE — Tesla Supercharger Route Planner" />
    <meta property="og:description" content="Meet CORE, the Charging Optimization &amp; Route Engine for building Tesla road trips around your vehicle, pace, Supercharger stops, badge targets, and must-see places." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://www.teslachargequest.com/landing/desert-road.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.teslachargequest.com/landing/desert-road.jpg" />
    <title>ChargeQuest CORE | Tesla Supercharger Route Planner for 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script id="site-structured-data" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ChargeQuest CORE",
        "url": "https://www.teslachargequest.com/",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Web",
        "description": "ChargeQuest CORE is a Charging Optimization & Route Engine and Tesla Supercharger route planner for multi-day road trips and the 2026 Tesla Supercharging Competition, with vehicle-aware range, Iconic Charger targets, landmarks, driving limits, saved routes, private route suggestions, and Anthony’s public journey.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "creator": {
          "@type": "Person",
          "name": "Anthony Pappano"
        },
        "provider": {
          "@type": "Organization",
          "name": "Antelligence LLC",
          "brand": {
            "@type": "Brand",
            "name": "ChargeQuest"
          }
        },
        "featureList": [
          "Tesla vehicle and practical range profiles",
          "Multi-day Supercharger route optimization",
          "Tesla Iconic Charger badge targets",
          "Saved custom routes and trip preferences",
          "Private route suggestions and Anthony's public trip tracking"
        ]
      }
    </script>
    <script>
      // No-flash theme init. Dark ("dash") is the default.
      (function () {
        try {
          var t = localStorage.getItem('sqp-theme')
          if (t !== 'tesla' && t !== 'dash') t = 'dash'
          document.documentElement.setAttribute('data-theme', t)
          var meta = document.getElementById('theme-color-meta')
          if (meta) meta.setAttribute('content', t === 'tesla' ? '#ffffff' : '#0a0d12')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dash')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
