<!doctype html>
<html lang="en" data-theme="dash">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=3" />
    <link rel="shortcut icon" href="/favicon-32.png?v=3" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0a0d12" id="theme-color-meta" />
    <meta
      name="description"
      content="Build and save a Tesla Supercharger route for the 2026 competition. Plan around your Tesla, real-world range, Iconic Charger badges, landmarks, and daily driving limits."
    />
    <link rel="canonical" href="https://supercharger-quest-planner.onrender.com/" />
    <meta property="og:url" content="https://supercharger-quest-planner.onrender.com/" />
    <meta property="og:site_name" content="ChargeQuest" />
    <meta property="og:title" content="ChargeQuest — Tesla Supercharger Route Planner" />
    <meta property="og:description" content="Use the same Tesla road trip planner Anthony built for his 2026 Supercharging Competition run. Create a free account and build a route that can beat his." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://supercharger-quest-planner.onrender.com/landing/desert-road.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://supercharger-quest-planner.onrender.com/landing/desert-road.jpg" />
    <title>ChargeQuest | Tesla Supercharger Route Planner for 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ChargeQuest",
        "url": "https://supercharger-quest-planner.onrender.com/",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Web",
        "description": "A Tesla Supercharger route planner for multi-day road trips and the 2026 Tesla Supercharging Competition, with vehicle-aware range, Iconic Charger targets, landmarks, driving limits, saved routes, and community trip suggestions.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "creator": {
          "@type": "Person",
          "name": "Anthony Pappano"
        },
        "featureList": [
          "Tesla vehicle and practical range profiles",
          "Multi-day Supercharger route optimization",
          "Tesla Iconic Charger badge targets",
          "Saved custom routes and trip preferences",
          "2026 competition community and live trip tracking"
        ]
      }
    </script>
    <script>
      // No-flash theme init. Dark ("dash") is the default.
      (function () {
        try {
          var t = localStorage.getItem('sqp-theme')
          if (t !== 'tesla' && t !== 'dash') t = 'dash'
          document.documentElement.setAttribute('data-theme', t)
          var meta = document.getElementById('theme-color-meta')
          if (meta) meta.setAttribute('content', t === 'tesla' ? '#ffffff' : '#0a0d12')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dash')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
