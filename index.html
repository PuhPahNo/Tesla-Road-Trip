<!doctype html>
<html lang="en" data-theme="dash">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/svg+xml" href="/brand-mark.svg?v=2" />
    <link rel="mask-icon" href="/brand-mark.svg?v=2" color="#e82127" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0a0d12" id="theme-color-meta" />
    <meta
      name="description"
      content="Plan a record-setting Tesla road trip with Charge Quest — routes, daily plans, and live station data."
    />
    <title>Charge Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // No-flash theme init. Dark ("dash") is the default.
      (function () {
        try {
          var t = localStorage.getItem('sqp-theme')
          if (t !== 'tesla' && t !== 'dash') t = 'dash'
          document.documentElement.setAttribute('data-theme', t)
          var meta = document.getElementById('theme-color-meta')
          if (meta) meta.setAttribute('content', t === 'tesla' ? '#ffffff' : '#0a0d12')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dash')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
